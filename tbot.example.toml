# Example tbot configuration file.
# Rename this file and edit it for your IRC server and bot settings.
[network]
server = "irc.example.net"
port = 6667
tls = false
channels = ["#example"]

[bot]
nick = "tbot"
user = "tbot"
realname = "tbot IRC bot"
command_prefix = "."
admins = ["tew!~tew@example.net"]
log_level = "info"
pidfile = ""

[barrel.url]
# Enable URL title lookup and repeat suppression.
enabled = true
# Number of seconds before the same URL can be resolved again in the same channel.
cooldown = 60

[barrel.fish]
# Enable the fish joke barrel.
enabled = true

[barrel.youtube]
# Enable YouTube link handling with enhanced metadata.
enabled = true
cooldown = 60
